# 输入方案定义：核心配置文件
schema:
  schema_id: sbzr
  name: "声笔自然"
  version: "0.5.3"
  dependencies:
    - sbpy
    - easy_en

switches:
  - name: ascii_mode
    reset: 0
    states: [中文, 西文]
  - name: ascii_punct
    reset: 0
    states: [。，, ．，]
  - name: zh_trad
    reset: 0
    states: [简体, 繁体]

menu:
  page_size: 6
  select_keys: " 12345"

engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - table_translator
    - table_translator@easy_en
    - history_translator
  filters:
    - simplifier
    - uniquifier

speller:
  alphabet: abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ
  # 关键：不要设置 initials，防止分段器根据声母自动切分
  delimiter: " '"
  auto_select: false
  max_code_length: 0     # 恢复为 0，允许无限长度输入（整句模式）
  algebra:
    - derive/^([a-z]{3})[a-z]$/$1/  # 派生 3 码前缀（如 ggei -> gge）
  use_space: false

translator:
  dictionary: sbzr
  enable_user_dict: true
  enable_sentence: true        # 开启码表整句
  enable_completion: true      # 开启追加补全提示
  sentence_over_completion: true # 优先匹配整句而非补全
  enable_encoder: true
  encode_whole_phrase: true
  max_phrase_length: 32        # 支持超长长句
  user_dict: sbzr
  db_class: tabledb
  initial_quality: 1000
  enable_preedit: false

easy_en:
  dictionary: easy_en
  enable_user_dict: false
  enable_sentence: false
  enable_completion: true
  spelling_hints: 9
  initial_quality: 900
  comment_format:
    - xform/^.+$//

history_translator:
  size: 1
  initial_quality: 10000

key_binder:
  import_preset: default
  bindings:
    - { when: has_menu, accept: Tab, send: Down }
    - { when: has_menu, accept: "Shift+Tab", send: Up }
    - { when: has_menu, accept: Up, send: Page_Up }
    - { when: has_menu, accept: Down, send: Page_Down }
    - { when: has_menu, accept: comma, send: Page_Up }
    - { when: has_menu, accept: period, send: Page_Down }
    - { accept: "Control+comma", select: .next, when: always }
    - { accept: "Control+period", select: .next, when: always }
    - { accept: "Shift+BackSpace", send: Escape, when: composing }

punctuator:
  import_preset: default

recognizer:
  import_preset: default
  patterns:
    uppercase: ''

simplifier:
  opencc_config: s2t.json
  option_name: zh_trad
