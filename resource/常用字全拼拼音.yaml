# 1 = 横 (一)
# 2 = 竖 (丨)
# 3 = 撇 (丿)
# 4 = 点 (丶/捺)
# 5 = 折 (乛/乙)
#
# 示例：薄 bao12
# bao 是全拼；1 是第一笔（横），2 是第二笔（竖）。

